name: BUZAU County Tests (Manual)

on:
  workflow_dispatch:

jobs:
  test-buzau:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: php -m

      - name: Run BUZAU tests
        id: test
        run: |
          mkdir -p testing/BUZAU/reports
          cd testing/BUZAU
          php run_tests.php

      - name: List all reports
        run: |
          echo "=== All test reports for BUZAU ==="
          ls -la testing/BUZAU/reports/

      - name: Upload BUZAU test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buzau-test-reports-${{ github.run_number }}
          path: testing/BUZAU/reports/
          retention-days: 30

      - name: Display latest report
        run: |
          LATEST=$(ls -td testing/BUZAU/reports/*/ | head -1)
          echo "=== Latest Report: $LATEST ==="
          cat "$LATEST/report.html"

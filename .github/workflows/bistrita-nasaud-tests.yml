name: BISTRITA-NASAUD County Tests (Manual)

on:
  workflow_dispatch:

jobs:
  test-bistrita-nasaud:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: php -m

      - name: Run BISTRITA-NASAUD tests
        id: test
        run: |
          mkdir -p testing/BISTRITA-NASAUD/reports
          cd testing/BISTRITA-NASAUD
          php run_tests.php || true

      - name: List all reports
        run: |
          echo "=== All test reports for BISTRITA-NASAUD ==="
          ls -la testing/BISTRITA-NASAUD/reports/

      - name: Upload BISTRITA-NASAUD test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bistrita-nasaud-test-reports-${{ github.run_number }}
          path: testing/BISTRITA-NASAUD/reports/
          retention-days: 30

      - name: Display latest report
        run: |
          LATEST=$(ls -td testing/BISTRITA-NASAUD/reports/*/ | head -1)
          echo "=== Latest Report: $LATEST ==="
          cat "$LATEST/report.html"

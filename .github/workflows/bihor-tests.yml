name: BIHOR County Tests (Manual)

on:
  workflow_dispatch:

jobs:
  test-bihor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: php -m

      - name: Run BIHOR tests
        id: test
        run: |
          mkdir -p testing/BIHOR/reports
          cd testing/BIHOR
          php run_tests.php || true

      - name: List all reports
        run: |
          echo "=== All test reports for BIHOR ==="
          ls -la testing/BIHOR/reports/

      - name: Upload BIHOR test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bihor-test-reports-${{ github.run_number }}
          path: testing/BIHOR/reports/
          retention-days: 30

      - name: Display latest report
        run: |
          LATEST=$(ls -td testing/BIHOR/reports/*/ | head -1)
          echo "=== Latest Report: $LATEST ==="
          cat "$LATEST/report.html"

name: ARAD County Tests (Manual)

on:
  workflow_dispatch:

jobs:
  test-arad:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: php -m

      - name: Run ARAD tests
        id: test
        run: |
          mkdir -p testing/ARAD/reports
          cd testing/ARAD
          php run_tests.php

      - name: List all reports
        run: |
          echo "=== All test reports for ARAD ==="
          ls -la testing/ARAD/reports/

      - name: Upload ARAD test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arad-test-reports-${{ github.run_number }}
          path: testing/ARAD/reports/
          retention-days: 30

      - name: Display latest report
        run: |
          LATEST=$(ls -td testing/ARAD/reports/*/ | head -1)
          echo "=== Latest Report: $LATEST ==="
          cat "$LATEST/report.html"

name: ILFOV County Tests (Manual)

on:
  workflow_dispatch:

jobs:
  test-braila:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: php -m

      - name: Run ILFOV tests
        id: test
        run: |
          mkdir -p testing/ILFOV/reports
          cd testing/ILFOV
          php run_tests.php

      - name: List all reports
        run: |
          echo "=== All test reports for ILFOV ==="
          ls -la testing/ILFOV/reports/

      - name: Upload ILFOV test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: braila-test-reports-${{ github.run_number }}
          path: testing/ILFOV/reports/
          retention-days: 30

      - name: Display latest report
        run: |
          LATEST=$(ls -td testing/ILFOV/reports/*/ | head -1)
          echo "=== Latest Report: $LATEST ==="
          cat "$LATEST/report.html"

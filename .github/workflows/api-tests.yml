name: API End-to-End Tests

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - endpoint: "/ROMANIA/ALBA/"
            name: "ALBA county"

    steps:
      - name: Test endpoint ${{ matrix.endpoint }}
        run: |
          URL="https://orase.peviitor.ro${{ matrix.endpoint }}"
          echo "Testing: $URL"
          
          # Get response
          RESPONSE=$(curl -s -w "\n%{http_code}" "$URL")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          # Check HTTP status
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ FAILED: HTTP $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi
          echo "✓ HTTP 200 OK"
          
          # Check for PHP errors
          if echo "$BODY" | grep -qi "php error\|parse error\|fatal error\|warning"; then
            echo "❌ FAILED: PHP error detected"
            echo "$BODY"
            exit 1
          fi
          echo "✓ No PHP errors"
          
          # Validate JSON
          if ! echo "$BODY" | jq . > /dev/null 2>&1; then
            echo "❌ FAILED: Invalid JSON response"
            echo "$BODY"
            exit 1
          fi
          echo "✓ Valid JSON"
          
          # Check response is not empty
          if [ -z "$BODY" ] || [ "$BODY" = "[]" ] || [ "$BODY" = "{}" ]; then
            echo "❌ FAILED: Empty response"
            exit 1
          fi
          echo "✓ Response not empty"
          
          echo "✅ PASSED: ${{ matrix.name }}"
